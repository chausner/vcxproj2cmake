name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration Release
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --settings CodeCoverage.runsettings --collect:"Code Coverage"
    - name: Generate test coverage report
      run: |
        dotnet tool install --global dotnet-coverage
        dotnet-coverage merge "**\*.coverage" --output-format cobertura
    - name: Publish
      if: runner.os == 'Windows'
      run: dotnet publish vcxproj2cmake\vcxproj2cmake.csproj --no-build --configuration Release -p:DebugSymbols=false
    - name: Upload published output
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: vcxproj2cmake-win-x64
        path: .\vcxproj2cmake\bin\Release\net10.0\win-x64\publish
    - name: Upload coverage report
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: coverage
        path: .\output.cobertura.xml

  e2e-test:
    runs-on: windows-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: minhook-detours
          repo: https://github.com/m417z/minhook-detours.git
          ref: v1.0.6
          sln: minhook-detours.sln
        - name: pugixml
          repo: https://github.com/zeux/pugixml.git
          ref: v1.16
          project: scripts\pugixml_vs2026_static.vcxproj

    steps:
    - name: Download vcxproj2cmake artifact
      uses: actions/download-artifact@v8
      with:
        name: vcxproj2cmake-win-x64
    - name: Clone ${{ matrix.name }}
      run: git clone --branch ${{ matrix.ref }} --depth 1 ${{ matrix.repo }} e2e-test/${{ matrix.name }}
    - name: Convert solution
      if: matrix.sln
      run: .\vcxproj2cmake.exe --solution e2e-test/${{ matrix.name }}/${{ matrix.sln }}
    - name: Convert project
      if: matrix.project
      run: .\vcxproj2cmake.exe --projects e2e-test/${{ matrix.name }}/${{ matrix.project }}
    - name: Install latest version of CMake
      shell: pwsh
      run: |
        python -m pip install --upgrade cmake
        $cmakeBin = python -c "import cmake; print(cmake.CMAKE_BIN_DIR)"
        $cmakeBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    - name: CMake configure
      run: |
        $cmakeSourceDir = Split-Path "${{ matrix.sln || matrix.project }}"
        cmake -S "e2e-test/${{ matrix.name }}/$cmakeSourceDir" -B e2e-test/${{ matrix.name }}/build -A x64
    - name: CMake build
      run: cmake --build e2e-test/${{ matrix.name }}/build --config Release

  submit-coverage:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download coverage artifact
      uses: actions/download-artifact@v8
      with:
        name: coverage
    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: ./output.cobertura.xml
        format: cobertura
